<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Chat Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desain scrollbar yang lebih halus dan tak kasat mata jika tidak digulir */
        #kotak-pesan::-webkit-scrollbar { width: 5px; }
        #kotak-pesan::-webkit-scrollbar-track { background: transparent; }
        #kotak-pesan::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.15); border-radius: 10px; }
        
        /* Latar belakang chat ala WhatsApp (warna krem lembut) */
        .bg-chat {
            background-color: #efeae2;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23d1c8bd' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-slate-200 h-screen flex items-center justify-center font-sans">

    <!-- Modal Masukkan Nama (Muncul pertama kali) -->
    <div id="modal-nama" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-11/12 max-w-sm transform transition-all duration-300 scale-100">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                👋
            </div>
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Selamat Datang!</h2>
            <p class="text-sm text-center text-slate-500 mb-6">Siapa nama kamu untuk mulai mengobrol?</p>
            
            <form id="form-login" class="flex flex-col gap-4">
                <input type="text" id="input-nama-awal" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium text-slate-800 text-center" placeholder="Ketik namamu..." required autocomplete="off">
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-2xl font-bold shadow-lg shadow-emerald-600/30 transition-transform active:scale-95">
                    Mulai Chatting
                </button>
            </form>
        </div>
    </div>

    <!-- Wadah Utama Aplikasi -->
    <div class="bg-white w-full h-full md:w-[400px] md:h-[90vh] md:max-h-[800px] md:rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden relative border-4 border-slate-800/10">
        
        <!-- Header Chat -->
        <div class="bg-[#008069] text-white p-3 pt-4 shadow-md z-10 flex items-center gap-3 shrink-0">
            <!-- Tombol kembali (dummy) & Foto Profil -->
            <div class="flex items-center gap-1 cursor-pointer hover:bg-white/10 p-1 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl overflow-hidden relative">
                    <img src="https://api.dicebear.com/7.x/shapes/svg?seed=GrupKita" alt="Grup" class="w-full h-full object-cover">
                </div>
            </div>
            
            <div class="flex-1 cursor-pointer">
                <h1 class="font-bold text-[16px] leading-tight">Grup Global</h1>
                <p class="text-[11px] text-emerald-100 font-medium">Ketuk untuk info grup</p>
            </div>
            
            <!-- Ikon tambahan (dummy) -->
            <div class="flex items-center gap-4 px-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cursor-pointer"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cursor-pointer"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cursor-pointer"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
            </div>
        </div>

        <!-- Area Pesan (Kotak Chat) -->
        <div id="kotak-pesan" class="flex-1 overflow-y-auto p-4 flex flex-col gap-1 bg-chat relative">
            <!-- Label Keamanan (Opsional) -->
            <div class="flex justify-center mb-4 mt-2">
                <div class="bg-yellow-100/80 text-yellow-800 text-[11px] px-3 py-1 rounded-lg text-center max-w-[90%] shadow-sm">
                    🔒 Pesan dienkripsi secara *end-to-end* (pura-puranya).
                </div>
            </div>
            
            <p class="text-center text-slate-500 text-sm mt-4 font-medium bg-white/50 py-1 rounded-full w-max mx-auto px-4" id="teks-loading">Memuat obrolan...</p>
        </div>

        <!-- Area Input Bawah -->
        <div class="p-2 bg-[#f0f2f5] z-10">
            <form id="form-chat" class="flex items-end gap-2">
                <!-- Ikon Smile -->
                <button type="button" class="p-3 text-slate-500 hover:text-slate-700 transition-colors shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                </button>
                
                <!-- Kolom Ketik -->
                <div class="flex-1 bg-white rounded-3xl flex items-center shadow-sm overflow-hidden mb-[2px]">
                    <textarea 
                        id="input-pesan" 
                        class="w-full bg-transparent text-slate-800 px-4 py-3 outline-none resize-none max-h-32 text-[15px] leading-tight" 
                        placeholder="Ketik pesan" 
                        rows="1"
                        required></textarea>
                    <button type="button" class="p-3 text-slate-400 hover:text-slate-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                </div>
                
                <!-- Tombol Kirim -->
                <button type="submit" class="bg-[#00a884] hover:bg-emerald-600 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-md shrink-0 transition-transform active:scale-95 mb-[2px]">
                    <!-- Ikon Mic diganti jadi Send saat ngetik (di sini kita pakai send saja agar mudah) -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="translate-x-[2px]"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Script Koneksi Supabase & Logika -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // Kredensial Proyek Kamu
        const supabaseUrl = 'https://geqlorezgqtfwwxccbwk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlcWxvcmV6Z3F0Znd3eGNjYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTMwNzksImV4cCI6MjA4OTA2OTA3OX0.243OpaRQykZdEGXd2NEqrwvC31MT_xC7X73cy_gk5oQ';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Elemen HTML
        const modalNama = document.getElementById('modal-nama');
        const formLogin = document.getElementById('form-login');
        const inputNamaAwal = document.getElementById('input-nama-awal');
        
        const formChat = document.getElementById('form-chat');
        const inputPesan = document.getElementById('input-pesan');
        const kotakPesan = document.getElementById('kotak-pesan');

        // Variabel Pengguna Saat Ini
        let namaSaya = localStorage.getItem('chatName');

        // LOGIKA LOGIN AWAL
        if (!namaSaya) {
            // Jika belum ada nama, jangan sembunyikan modal
        } else {
            // Sembunyikan modal, mulai ambil pesan
            modalNama.classList.add('opacity-0', 'pointer-events-none');
            ambilPesanLama();
        }

        formLogin.addEventListener('submit', (e) => {
            e.preventDefault();
            const namaDiketik = inputNamaAwal.value.trim();
            if (namaDiketik) {
                namaSaya = namaDiketik;
                localStorage.setItem('chatName', namaSaya); // Simpan permanen
                modalNama.classList.add('opacity-0', 'pointer-events-none');
                ambilPesanLama();
            }
        });

        // FUNGSI MEMFORMAT WAKTU (HH:MM)
        function formatWaktu(waktuISO) {
            if (!waktuISO) return '';
            const date = new Date(waktuISO);
            return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }

        // FUNGSI MENGGAMBAR PESAN KE LAYAR
        function tampilkanPesanKeLayar(pengirim, isi, waktuISO) {
            const elemenPesan = document.createElement('div');
            const waktuTeks = formatWaktu(waktuISO);
            
            // Apakah ini pesan dari saya atau orang lain?
            const apakahPesanSaya = (pengirim === namaSaya);

            if (apakahPesanSaya) {
                // Tampilan Gelembung Kanan (Hijau)
                elemenPesan.className = 'flex justify-end w-full mb-1';
                elemenPesan.innerHTML = `
                    <div class="bg-[#d9fdd3] text-slate-800 px-3 py-1.5 rounded-2xl rounded-tr-sm max-w-[85%] shadow-[0_1px_1px_rgba(0,0,0,0.1)] relative group">
                        <div class="flex flex-wrap items-end justify-between gap-x-2">
                            <p class="text-[15px] leading-snug break-words max-w-full">${isi}</p>
                            <span class="text-[10px] text-slate-500/90 whitespace-nowrap ml-auto pt-1 relative top-[2px]">
                                ${waktuTeks}
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline text-[#53bdeb] ml-[2px]"><path d="M18 6 7 17l-5-5"></path><path d="m22 10-7.5 7.5L13 16"></path></svg>
                            </span>
                        </div>
                    </div>
                `;
            } else {
                // Tampilan Gelembung Kiri (Putih)
                // Memilih warna acak untuk nama berdasarkan huruf pertama agar estetis
                const warnaNama = ['text-red-500', 'text-blue-500', 'text-purple-500', 'text-orange-500', 'text-pink-500'][pengirim.charCodeAt(0) % 5];
                
                elemenPesan.className = 'flex justify-start w-full mb-1';
                elemenPesan.innerHTML = `
                    <div class="bg-white text-slate-800 px-3 py-1.5 rounded-2xl rounded-tl-sm max-w-[85%] shadow-[0_1px_1px_rgba(0,0,0,0.1)] relative">
                        <p class="text-[12px] font-bold ${warnaNama} mb-0.5">${pengirim}</p>
                        <div class="flex flex-wrap items-end justify-between gap-x-2">
                            <p class="text-[15px] leading-snug break-words max-w-full">${isi}</p>
                            <span class="text-[10px] text-slate-400 whitespace-nowrap ml-auto pt-1 relative top-[2px]">${waktuTeks}</span>
                        </div>
                    </div>
                `;
            }

            kotakPesan.appendChild(elemenPesan);
            kotakPesan.scrollTop = kotakPesan.scrollHeight; // Auto-scroll
        }

        // MENGAMBIL PESAN LAMA
        async function ambilPesanLama() {
            const teksLoading = document.getElementById('teks-loading');
            
            const { data, error } = await supabase
                .from('pesan')
                .select('*')
                .order('created_at', { ascending: true }); 
            
            if (teksLoading) teksLoading.remove();
            
            if (error) {
                console.error("Gagal ambil data:", error);
                kotakPesan.innerHTML += '<p class="text-red-500 bg-red-100 p-2 rounded text-center text-sm mt-4 mx-auto w-3/4">Gagal terhubung ke database. Cek pengaturan RLS.</p>';
                return;
            }

            data.forEach(pesan => tampilkanPesanKeLayar(pesan.pengirim, pesan.isi_pesan, pesan.created_at));
        }

        // MENGIRIM PESAN BARU
        formChat.addEventListener('submit', async function(e) {
            e.preventDefault();
            const teks = inputPesan.value.trim();
            
            if (teks !== "") {
                inputPesan.value = ""; // Kosongkan form secepatnya
                inputPesan.style.height = 'auto'; // Reset tinggi textarea
                
                const waktuSekarang = new Date().toISOString();

                // Simpan ke Supabase
                const { error } = await supabase
                    .from('pesan')
                    .insert([
                        { pengirim: namaSaya, isi_pesan: teks, created_at: waktuSekarang }
                    ]);

                if (error) {
                    console.error("Gagal mengirim:", error);
                    alert("Gagal mengirim pesan! Cek jaringan atau pengaturan RLS.");
                }
            }
        });

        // Fitur Textarea auto-resize (biar bisa ketik panjang)
        inputPesan.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Submit form jika tekan Enter (tanpa Shift)
        inputPesan.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                formChat.dispatchEvent(new Event('submit'));
            }
        });

        // MENDENGARKAN PESAN REAL-TIME
        supabase
            .channel('ruang-publik')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pesan' }, payload => {
                const pesanBaru = payload.new;
                tampilkanPesanKeLayar(pesanBaru.pengirim, pesanBaru.isi_pesan, pesanBaru.created_at);
            })
            .subscribe();

    </script>
</body>
</html>
