<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone - Private Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.2); border-radius: 10px; }
        .bg-chat {
            background-color: #efeae2;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23d1c8bd' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .hidden-view { display: none !important; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-scale { animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideInUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#d1d7db] h-screen w-screen flex items-center justify-center font-sans overflow-hidden relative">

    <div class="absolute top-0 w-full h-[127px] bg-[#00a884] -z-10 hidden md:block transition-all duration-500"></div>

    <!-- MODAL TAMBAH KONTAK -->
    <div id="modal-kontak" class="hidden-view fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm animate-fade-scale">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Tambah Kontak</h2>
            <p class="text-sm text-slate-500 mb-4">Cari teman berdasarkan Nama Profil mereka.</p>
            
            <div class="flex flex-col gap-3">
                <input type="text" id="input-cari-nama" class="bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-[#00a884] w-full text-sm" placeholder="Nama Profil Teman">
                <input type="text" id="input-nama-panggilan" class="bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-[#00a884] w-full text-sm" placeholder="Nama Panggilan">
                
                <div class="flex gap-2 mt-2">
                    <button onclick="tutupModalKontak()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2.5 rounded-xl font-bold transition-all">Batal</button>
                    <button onclick="prosesTambahKontak()" id="btn-simpan-kontak" class="flex-1 bg-[#00a884] hover:bg-[#008f6f] text-white py-2.5 rounded-xl font-bold transition-all shadow-md">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- VIEW 1: LOGIN -->
    <div id="view-auth" class="bg-white p-8 rounded-2xl shadow-2xl w-11/12 max-w-md z-10 animate-fade-scale">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-[#25D366] text-white rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg">💬</div>
            <h1 class="text-2xl font-bold text-slate-800">WhatsApp Clone</h1>
            <p class="text-slate-500 text-sm mt-1">Masuk dengan Email & Sandi</p>
        </div>
        <form id="form-auth" class="flex flex-col gap-4">
            <input type="email" id="auth-email" class="bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-[#00a884]" placeholder="Email" required>
            <input type="password" id="auth-pass" class="bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-[#00a884]" placeholder="Sandi" required minlength="6">
            <div class="flex gap-2 mt-2">
                <button type="button" id="btn-login" class="flex-1 bg-[#00a884] text-white py-3 rounded-xl font-bold hover:bg-[#008f6f]">Masuk</button>
                <button type="button" id="btn-register" class="flex-1 bg-white border-2 border-[#00a884] text-[#00a884] py-3 rounded-xl font-bold hover:bg-emerald-50">Daftar</button>
            </div>
            <p id="auth-error" class="text-red-500 text-xs text-center font-medium h-4"></p>
        </form>
    </div>

    <!-- VIEW 2: PROFIL -->
    <div id="view-profile" class="hidden-view bg-white p-8 rounded-2xl shadow-2xl w-11/12 max-w-md z-10 text-center animate-fade-scale">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Profil Kamu</h2>
        <p class="text-slate-500 text-sm mb-6">Sesuaikan nama dan foto profilmu.</p>
        
        <form id="form-profile" class="flex flex-col gap-5 items-center">
            <!-- Upload Foto Profil -->
            <div class="relative group cursor-pointer" onclick="document.getElementById('input-pfp').click()">
                <div class="w-32 h-32 rounded-full bg-slate-200 overflow-hidden border-4 border-white shadow-lg flex items-center justify-center">
                    <img id="preview-pfp" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Me" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </div>
                </div>
                <input type="file" id="input-pfp" accept="image/*" class="hidden">
            </div>

            <input type="text" id="input-nama-profil" class="w-full bg-slate-50 border-b-2 border-slate-300 px-2 py-3 outline-none focus:border-[#00a884] text-center text-lg font-medium" placeholder="Nama Profil Kamu" required>
            
            <div class="flex gap-2 w-full">
                <button type="button" onclick="gantiTampilan('view-main')" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">Batal</button>
                <button type="submit" id="btn-save-profile" class="flex-2 bg-[#00a884] text-white py-3 px-8 rounded-xl font-bold shadow-md hover:bg-[#008f6f]">Simpan</button>
            </div>
        </form>
    </div>

    <!-- VIEW 3: MAIN APP -->
    <div id="view-main" class="hidden-view w-full h-full md:w-[95vw] md:h-[95vh] md:max-w-[1600px] bg-white md:rounded-lg shadow-2xl flex overflow-hidden animate-fade-scale">
        
        <div id="sidebar" class="w-full md:w-[30%] lg:w-[25%] bg-white flex flex-col border-r border-slate-200 shrink-0 h-full z-20 absolute md:relative">
            <div class="bg-[#f0f2f5] p-3 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-3">
                    <img id="my-avatar" src="" class="w-10 h-10 rounded-full object-cover cursor-pointer hover:opacity-80 transition-opacity" onclick="gantiTampilan('view-profile')">
                    <span id="my-name" class="font-semibold text-slate-800 text-sm cursor-pointer" onclick="gantiTampilan('view-profile')">Nama Saya</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="bukaModalKontak()" class="hover:bg-slate-200 text-slate-600 p-2 rounded-full transition-all" title="Tambah Kontak">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    </button>
                    <button onclick="keluar()" class="hover:bg-red-100 text-red-500 p-2 rounded-full transition-all" title="Keluar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
            
            <div class="p-2 border-b border-slate-200 bg-white">
                <p class="text-xs font-bold text-[#00a884] px-2 mb-1">DAFTAR KONTAK</p>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto bg-white">
                <p class="text-center text-slate-400 text-sm mt-10">Memuat kontak...</p>
            </div>
        </div>

        <div id="chat-area" class="w-full md:w-[70%] lg:w-[75%] bg-chat flex-col relative hidden md:flex h-full">
            <div id="layar-kosong" class="absolute inset-0 bg-[#f0f2f5] z-10 flex flex-col items-center justify-center p-8 border-b-[6px] border-[#25D366]">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-24 h-24 mb-6 opacity-30 grayscale">
                <h1 class="text-3xl font-light text-slate-700 mb-2">WhatsApp Web</h1>
                <p class="text-slate-500 text-sm">Pilih kontak untuk mulai mengobrol.</p>
            </div>

            <div class="bg-[#f0f2f5] p-3 flex items-center justify-between shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <button onclick="tutupChatMobile()" class="md:hidden text-slate-500 p-1 -ml-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                    <img id="active-chat-avatar" src="" class="w-10 h-10 rounded-full object-cover">
                    <h2 id="active-chat-name" class="font-semibold text-slate-800">Nama</h2>
                </div>
                
                <button onclick="bersihkanObrolan()" class="hover:bg-red-100 text-red-500 p-2 rounded-full transition-all flex items-center gap-1 text-xs font-bold px-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    <span class="hidden md:inline">Clear Chat</span>
                </button>
            </div>

            <div id="kotak-pesan" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-2 relative scroll-smooth"></div>

            <div class="bg-[#f0f2f5] p-3 flex items-end gap-2 shrink-0 z-10">
                <div class="flex-1 bg-white rounded-xl flex items-center shadow-sm px-4 py-2 focus-within:ring-1 focus-within:ring-emerald-300">
                    <textarea id="input-pesan" class="w-full bg-transparent outline-none resize-none max-h-32 text-slate-800 py-1" placeholder="Ketik pesan" rows="1"></textarea>
                </div>
                <button id="btn-kirim" class="bg-[#00a884] text-white rounded-full w-12 h-12 flex items-center justify-center shrink-0 shadow-md active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="translate-x-[1px]"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://geqlorezgqtfwwxccbwk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlcWxvcmV6Z3F0Znd3eGNjYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTMwNzksImV4cCI6MjA4OTA2OTA3OX0.243OpaRQykZdEGXd2NEqrwvC31MT_xC7X73cy_gk5oQ';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentProfile = null;
        let activeChatId = null;
        let realtimeSubscription = null;

        window.gantiTampilan = function(viewId) {
            ['view-auth', 'view-profile', 'view-main'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
            document.getElementById(viewId).classList.remove('hidden-view');
        }

        async function cekSesi() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                cekProfil(currentUser.id);
            } else {
                gantiTampilan('view-auth');
            }
        }

        async function cekProfil(userId) {
            const { data } = await supabase.from('profil').select('*').eq('id', userId).single();
            if (data && data.nama) {
                currentProfile = data;
                document.getElementById('my-name').textContent = data.nama;
                document.getElementById('my-avatar').src = data.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + data.nama;
                document.getElementById('preview-pfp').src = document.getElementById('my-avatar').src;
                document.getElementById('input-nama-profil').value = data.nama;
                gantiTampilan('view-main');
                muatDaftarKontak();
            } else {
                gantiTampilan('view-profile');
            }
        }
        cekSesi(); 

        // LOGIN & DAFTAR
        document.getElementById('btn-login').addEventListener('click', async () => {
            const { error } = await supabase.auth.signInWithPassword({ email: document.getElementById('auth-email').value, password: document.getElementById('auth-pass').value });
            if (error) document.getElementById('auth-error').textContent = error.message; else cekSesi();
        });
        document.getElementById('btn-register').addEventListener('click', async () => {
            const { error } = await supabase.auth.signUp({ email: document.getElementById('auth-email').value, password: document.getElementById('auth-pass').value });
            if (error) document.getElementById('auth-error').textContent = error.message; 
            else document.getElementById('auth-error').textContent = "Berhasil! Silakan klik Masuk.";
        });
        window.keluar = async function() { await supabase.auth.signOut(); window.location.reload(); }

        // LOGIKA PROFIL
        const inputPfp = document.getElementById('input-pfp');
        const previewPfp = document.getElementById('preview-pfp');
        let fileFotoTerpilih = null;

        inputPfp.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                fileFotoTerpilih = e.target.files[0];
                previewPfp.src = URL.createObjectURL(fileFotoTerpilih);
            }
        });

        document.getElementById('form-profile').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-profile');
            btn.textContent = "Menyimpan...";
            const nama = document.getElementById('input-nama-profil').value;
            let avatarUrl = previewPfp.src;

            try {
                if (fileFotoTerpilih) {
                    const ext = fileFotoTerpilih.name.split('.').pop();
                    const fileName = `${currentUser.id}-${Date.now()}.${ext}`;
                    const { error: uploadErr } = await supabase.storage.from('avatars').upload(fileName, fileFotoTerpilih);
                    if (!uploadErr) {
                        const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
                        avatarUrl = data.publicUrl;
                    }
                }
                await supabase.from('profil').upsert({ id: currentUser.id, nama: nama, avatar_url: avatarUrl });
                cekProfil(currentUser.id);
            } catch (err) {
                alert("Gagal update profil.");
            } finally {
                btn.textContent = "Simpan";
            }
        });

        // TAMBAH KONTAK
        window.bukaModalKontak = function() {
            document.getElementById('modal-kontak').classList.remove('hidden-view');
        }
        window.tutupModalKontak = function() { document.getElementById('modal-kontak').classList.add('hidden-view'); }

        window.prosesTambahKontak = async function() {
            const namaDicari = document.getElementById('input-cari-nama').value.trim();
            const namaPanggilan = document.getElementById('input-nama-panggilan').value.trim() || namaDicari;
            if(!namaDicari) return;

            try {
                const { data: teman, error: errCari } = await supabase.from('profil').select('id').eq('nama', namaDicari).single();
                if (errCari || !teman) throw new Error("Teman tidak ditemukan!");

                await supabase.from('kontak').insert({ pemilik_id: currentUser.id, teman_id: teman.id, nama_kontak: namaPanggilan });

                const { data: roomSaya } = await supabase.from('peserta_chat').select('ruang_id').eq('profil_id', currentUser.id);
                // FIX: Gunakan (data || []) untuk mencegah error map pada data null
                const idRoomSaya = (roomSaya || []).map(r => r.ruang_id);
                
                let ruangIdBersama = null;
                if(idRoomSaya.length > 0) {
                    const { data: roomBersama } = await supabase.from('peserta_chat').select('ruang_id').eq('profil_id', teman.id).in('ruang_id', idRoomSaya).limit(1);
                    if(roomBersama && roomBersama.length > 0) ruangIdBersama = roomBersama[0].ruang_id;
                }

                if (!ruangIdBersama) {
                    const { data: ruangBaru } = await supabase.from('ruang_chat').insert({ nama_ruang: 'Private', tipe: 'pribadi' }).select().single();
                    await supabase.from('peserta_chat').insert([{ ruang_id: ruangBaru.id, profil_id: currentUser.id }, { ruang_id: ruangBaru.id, profil_id: teman.id }]);
                }
                tutupModalKontak();
                muatDaftarKontak();
            } catch(e) { alert(e.message); }
        }

        async function muatDaftarKontak() {
            const listEl = document.getElementById('chat-list');
            const { data: daftarKontak } = await supabase.from('kontak').select('*').eq('pemilik_id', currentUser.id).order('nama_kontak');
            if (!daftarKontak || daftarKontak.length === 0) { listEl.innerHTML = '<p class="text-slate-400 text-center mt-10 text-sm">Belum ada kontak.</p>'; return; }
            listEl.innerHTML = '';
            for (let kontak of daftarKontak) {
                const { data: profTeman } = await supabase.from('profil').select('avatar_url').eq('id', kontak.teman_id).single();
                const avatar = profTeman?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+kontak.nama_kontak;
                const item = document.createElement('div');
                item.className = 'flex items-center gap-3 p-3 hover:bg-[#f5f6f6] cursor-pointer border-b border-slate-50 transition-colors';
                item.onclick = () => prosesBukaChat(kontak.teman_id, kontak.nama_kontak, avatar);
                item.innerHTML = `<img src="${avatar}" class="w-12 h-12 rounded-full object-cover"><h3 class="text-slate-800 font-medium">${kontak.nama_kontak}</h3>`;
                listEl.appendChild(item);
            }
        }

        async function prosesBukaChat(temanId, namaPanggilan, avatar) {
            document.getElementById('layar-kosong').classList.add('hidden');
            document.getElementById('active-chat-name').textContent = namaPanggilan;
            document.getElementById('active-chat-avatar').src = avatar;
            if (window.innerWidth < 768) { document.getElementById('sidebar').classList.add('hidden'); document.getElementById('chat-area').classList.remove('hidden'); document.getElementById('chat-area').classList.add('flex'); }

            const { data: roomSaya } = await supabase.from('peserta_chat').select('ruang_id').eq('profil_id', currentUser.id);
            // FIX: Gunakan (data || []) untuk mencegah error map pada data null
            const idRoomSaya = (roomSaya || []).map(r => r.ruang_id);
            
            if (idRoomSaya.length > 0) {
                const { data: roomBersama } = await supabase.from('peserta_chat').select('ruang_id').eq('profil_id', temanId).in('ruang_id', idRoomSaya).limit(1);
                if (roomBersama && roomBersama.length > 0) {
                    activeChatId = roomBersama[0].ruang_id;

                    const { data: pesanLama } = await supabase.from('pesan_baru').select('*').eq('ruang_id', activeChatId).order('created_at', { ascending: true });
                    const kotakPesan = document.getElementById('kotak-pesan');
                    kotakPesan.innerHTML = '<div class="flex justify-center mb-4 mt-2"><div class="bg-[#ffeecd] text-slate-700 text-[11px] px-3 py-1.5 rounded-lg text-center shadow-sm">🔒 Pesan ini aman.</div></div>';
                    if (pesanLama) pesanLama.forEach(msg => gambarGelembungPesan(msg));

                    if (realtimeSubscription) supabase.removeChannel(realtimeSubscription); 
                    realtimeSubscription = supabase.channel(`ruang-${activeChatId}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pesan_baru', filter: `ruang_id=eq.${activeChatId}` }, payload => gambarGelembungPesan(payload.new)).subscribe();
                }
            }
        }

        function gambarGelembungPesan(msg) {
            const apakahSaya = msg.pengirim_id === currentUser.id;
            const waktu = new Date(msg.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `flex w-full mb-1 animate-slide-up opacity-0 ${apakahSaya ? 'justify-end' : 'justify-start'}`;
            if (apakahSaya) div.innerHTML = `<div class="bg-[#d9fdd3] text-slate-800 px-3 py-1.5 rounded-lg rounded-tr-none max-w-[85%] shadow-sm relative"><p class="text-[14.5px] leading-relaxed break-words">${msg.isi_pesan}</p><span class="text-[10px] text-slate-500 ml-auto pt-1">${waktu}</span></div>`;
            else div.innerHTML = `<div class="bg-white text-slate-800 px-3 py-1.5 rounded-lg rounded-tl-none shadow-sm relative"><p class="text-[14.5px] leading-relaxed break-words">${msg.isi_pesan}</p><span class="text-[10px] text-slate-400 ml-auto pt-1">${waktu}</span></div>`;
            document.getElementById('kotak-pesan').appendChild(div);
            document.getElementById('kotak-pesan').scrollTop = document.getElementById('kotak-pesan').scrollHeight;
        }

        window.tutupChatMobile = function() { document.getElementById('sidebar').classList.remove('hidden'); document.getElementById('chat-area').classList.add('hidden'); }

        window.bersihkanObrolan = async function() {
            if(!activeChatId || !confirm("Hapus semua pesan?")) return;
            await supabase.from('pesan_baru').delete().eq('ruang_id', activeChatId);
            document.getElementById('kotak-pesan').innerHTML = '';
        }

        document.getElementById('btn-kirim').addEventListener('click', kirimPesan);
        document.getElementById('input-pesan').addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); kirimPesan(); }});
        async function kirimPesan() {
            const inputEl = document.getElementById('input-pesan');
            const teks = inputEl.value.trim();
            if (teks === "" || !activeChatId) return;
            inputEl.value = ""; inputEl.style.height = 'auto'; 
            await supabase.from('pesan_baru').insert([{ ruang_id: activeChatId, pengirim_id: currentUser.id, isi_pesan: teks }]);
        }
    </script>
</body>
</html>
