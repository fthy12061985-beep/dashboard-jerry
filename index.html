<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Chat Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #kotak-pesan::-webkit-scrollbar { width: 6px; }
        #kotak-pesan::-webkit-scrollbar-track { background: transparent; }
        #kotak-pesan::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white w-full max-w-md h-[600px] rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-slate-200">
        
        <div class="bg-emerald-600 text-white p-4 shadow-md z-10 flex items-center gap-3">
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">💬</div>
            <div>
                <h1 class="font-bold text-lg">Chat Kita</h1>
                <p class="text-xs text-emerald-200">Terhubung ke Supabase secara Real-time!</p>
            </div>
        </div>

        <div id="kotak-pesan" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-slate-50">
            <p class="text-center text-slate-400 text-sm mt-4" id="teks-loading">Memuat obrolan...</p>
        </div>

        <div class="p-3 bg-white border-t border-slate-200">
            <form id="form-chat" class="flex items-center gap-2">
                <input type="text" id="input-nama" class="w-1/4 bg-slate-100 text-slate-800 rounded-full px-3 py-3 outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="Nama" required>
                <input type="text" id="input-pesan" class="flex-1 bg-slate-100 text-slate-800 rounded-full px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="Ketik pesan..." autocomplete="off" required>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-md shrink-0 transition-transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. Memuat Library Supabase
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // 2. Kredensial Proyek Kamu
        const supabaseUrl = 'https://geqlorezgqtfwwxccbwk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlcWxvcmV6Z3F0Znd3eGNjYndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTMwNzksImV4cCI6MjA4OTA2OTA3OX0.243OpaRQykZdEGXd2NEqrwvC31MT_xC7X73cy_gk5oQ';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const formChat = document.getElementById('form-chat');
        const inputNama = document.getElementById('input-nama');
        const inputPesan = document.getElementById('input-pesan');
        const kotakPesan = document.getElementById('kotak-pesan');

        // Fungsi Menggambar Pesan ke Layar
        function tampilkanPesanKeLayar(pengirim, isi) {
            const elemenPesan = document.createElement('div');
            elemenPesan.className = 'flex items-end gap-2 mt-2';
            const inisial = pengirim ? pengirim.substring(0, 2).toUpperCase() : 'U';
            
            elemenPesan.innerHTML = `
                <div class="w-8 h-8 bg-emerald-200 rounded-full flex items-center justify-center text-xs font-bold text-emerald-800 mb-1 shrink-0">
                    ${inisial}
                </div>
                <div class="bg-white border border-slate-200 text-slate-800 p-3 rounded-2xl rounded-bl-none shadow-sm max-w-[80%]">
                    <p class="text-[10px] font-bold text-emerald-600 mb-1">${pengirim}</p>
                    <p class="text-sm">${isi}</p>
                </div>
            `;
            kotakPesan.appendChild(elemenPesan);
            kotakPesan.scrollTop = kotakPesan.scrollHeight; // Auto-scroll ke bawah
        }

        // 3. Mengambil Pesan Lama dari Database
        async function ambilPesanLama() {
            const { data, error } = await supabase
                .from('pesan')
                .select('*')
                .order('created_at', { ascending: true }); // Mengurutkan dari yang terlama
            
            kotakPesan.innerHTML = ''; // Bersihkan teks loading
            
            if (error) {
                console.error("Gagal ambil data:", error);
                kotakPesan.innerHTML = '<p class="text-red-500 text-center text-sm mt-4">Gagal terhubung ke database. Cek pengaturan RLS.</p>';
                return;
            }

            // Tampilkan satu per satu
            data.forEach(pesan => tampilkanPesanKeLayar(pesan.pengirim, pesan.isi_pesan));
        }

        ambilPesanLama();

        // 4. Mengirim Pesan Baru ke Database
        formChat.addEventListener('submit', async function(e) {
            e.preventDefault();
            const nama = inputNama.value.trim() || 'Anonim';
            const teks = inputPesan.value.trim();
            
            if (teks !== "") {
                inputPesan.value = ""; // Kosongkan form secepatnya
                
                // Simpan ke Supabase!
                const { error } = await supabase
                    .from('pesan')
                    .insert([
                        // FIX: Menambahkan created_at dengan waktu saat ini (ISO format)
                        { pengirim: nama, isi_pesan: teks, created_at: new Date().toISOString() }
                    ]);

                if (error) {
                    console.error("Gagal mengirim:", error);
                    alert("Gagal mengirim pesan! Cek pengaturan RLS di Supabase.");
                }
            }
        });

        // 5. Mendengarkan Pesan Baru secara Real-time
        supabase
            .channel('ruang-publik')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pesan' }, payload => {
                const pesanBaru = payload.new;
                tampilkanPesanKeLayar(pesanBaru.pengirim, pesanBaru.isi_pesan);
            })
            .subscribe();

    </script>
</body>
</html>
